<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>英语单词检测系统</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{padding:20px;max-width:1200px;margin:0 auto}
        .btn{padding:8px 16px;margin:5px;border:none;border-radius:5px;cursor:pointer}
        .blue{background:#2d8cf0;color:white}
        .green{background:#19be6b;color:white}
        .orange{background:#ff9f43;color:white}
        .red{background:#f56c6c;color:white}
        .box{border:1px solid #ddd;border-radius:8px;padding:15px;margin:10px 0}
        .title{text-align:center;margin:20px 0}
        .login{max-width:400px;margin:50px auto;padding:30px;border:1px solid #ddd;border-radius:10px}
        .login input{width:100%;padding:10px;margin:15px 0}
        .group{width:24%;display:inline-block;vertical-align:top;margin:5px}
        .student{padding:10px;margin:5px 0;text-align:center;border-radius:5px;cursor:pointer}
        .error{color:red;margin-top:10px}
        .stats{background:#fff7e8;padding:15px;border-radius:8px;margin-top:20px}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
        .modal .content{background:white;padding:30px;border-radius:10px;width:400px;text-align:center}
        .content input{width:80%;padding:10px;margin:15px 0}
    </style>
</head>
<body>

<button class="btn blue" onclick="showTeacher()">教师页面</button>
<button class="btn green" onclick="showParent()">家长页面</button>

<!-- 教师登录 -->
<div id="loginPage" class="login">
    <h2>教师登录</h2>
    <input id="pwd" type="password" placeholder="请输入密码">
    <button class="btn blue" onclick="login()">登录</button>
    <div id="errTip" class="error" style="display:none">密码错误！</div>
</div>

<!-- 教师管理页 -->
<div id="teacherPage" style="display:none">
    <h2 class="title">教师管理</h2>
    <div class="box">
        <button class="btn orange" onclick="importStudent()">导入学生Excel</button>
        <button class="btn orange" onclick="importWord()">导入单词Excel</button>
        <button class="btn red" onclick="clearAllData()">清空所有数据</button>
        <input type="file" id="fileStudent" style="display:none" accept=".xlsx,.xls">
        <input type="file" id="fileWord" style="display:none" accept=".xlsx,.xls">
        <p style="margin-top:10px">学生表：1列姓名 | 单词表：A列英文 B列中文</p>
    </div>
</div>

<!-- 家长页面 -->
<div id="parentPage" style="display:none">
    <h1 class="title">英语单词检测</h1>
    <div id="groupContainer"></div>
    <div class="stats">
        <h3>出错单词统计</h3>
        <div id="errorList"></div>
    </div>
</div>

<!-- 检测弹窗 -->
<div class="modal" id="testModal">
    <div class="content">
        <h2>单词检测</h2>
        <div id="chinese" style="font-size:22px;margin:15px 0"></div>
        <input id="answer" placeholder="输入英文单词">
        <br>
        <button class="btn blue" onclick="next()">提交</button>
    </div>
</div>

<script>
// ========== 配置 ==========
const PASSWORD = "123456";
let students = JSON.parse(localStorage.getItem("students")) || [];
let words = JSON.parse(localStorage.getItem("words")) || [];
let errors = JSON.parse(localStorage.getItem("errors")) || {};
let currentStu = "";
let index = 0;
let correct = 0;

// ========== 页面切换 ==========
function showTeacher(){
    document.getElementById("loginPage").style.display="block";
    document.getElementById("teacherPage").style.display="none";
    document.getElementById("parentPage").style.display="none";
}
function showParent(){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("teacherPage").style.display="none";
    document.getElementById("parentPage").style.display="block";
    render();
}

// ========== 登录 ==========
function login(){
    let val = document.getElementById("pwd").value;
    if(val === PASSWORD){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("teacherPage").style.display="block";
        document.getElementById("errTip").style.display="none";
    }else{
        document.getElementById("errTip").style.display="block";
    }
}

// ========== 清空所有数据 ==========
function clearAllData(){
    if(!confirm("确定清空所有数据？学生、单词、记录将全部重置！")) return;
    students = [];
    words = [];
    errors = {};
    localStorage.removeItem("students");
    localStorage.removeItem("words");
    localStorage.removeItem("errors");
    alert("已清空所有数据！");
    render();
}

// ========== 导入学生 ==========
function importStudent(){
    document.getElementById("fileStudent").click();
    document.getElementById("fileStudent").onchange=e=>{
        let reader = new FileReader();
        reader.onload=ev=>{
            let wb = XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
            let arr = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
            students = arr.filter(i=>i[0]).map(i=>({name:i[0].trim(),done:false,rate:"0%"}));
            localStorage.setItem("students",JSON.stringify(students));
            alert("导入成功！");
            render();
        }
        reader.readAsArrayBuffer(e.target.files[0]);
    }
}

// ========== 导入单词 ==========
function importWord(){
    document.getElementById("fileWord").click();
    document.getElementById("fileWord").onchange=e=>{
        let reader = new FileReader();
        reader.onload=ev=>{
            let wb = XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
            let arr = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
            words = arr.filter(i=>i[0]&&i[1]).map(i=>({en:i[0].trim(),cn:i[1].trim()}));
            localStorage.setItem("words",JSON.stringify(words));
            alert("导入成功！");
        }
        reader.readAsArrayBuffer(e.target.files[0]);
    }
}

// ========== 渲染学生 ==========
function render(){
    let container = document.getElementById("groupContainer");
    container.innerHTML = "";
    let g1=[],g2=[],g3=[],g4=[];
    students.forEach((s,i)=>{
        if(i%4===0)g1.push(s);
        else if(i%4===1)g2.push(s);
        else if(i%4===2)g3.push(s);
        else g4.push(s);
    })
    renderGroup(g1,1);
    renderGroup(g2,2);
    renderGroup(g3,3);
    renderGroup(g4,4);
    renderErrors();
}

function renderGroup(g,num){
    let div = document.createElement("div");
    div.className="group";
    div.innerHTML=`<h3>第${num}组</h3>`;
    g.forEach(s=>{
        let item = document.createElement("div");
        item.className="student";
        item.style.background = s.done ? "#19be6b" : "#ff9f43";
        item.innerText = s.name + (s.done ? ` ${s.rate}` : "");
        item.onclick=()=>startTest(s.name);
        div.appendChild(item);
    })
    document.getElementById("groupContainer").appendChild(div);
}

// ========== 开始测试 ==========
function startTest(name){
    if(words.length===0){alert("请先导入单词！");return}
    currentStu = name;
    index = 0;
    correct = 0;
    document.getElementById("testModal").style.display="flex";
    showWord();
}

function showWord(){
    if(index >= words.length){
        let rate = Math.round(correct/words.length*100)+"%";
        students = students.map(s=>s.name===currentStu ? {...s,done:true,rate:rate} : s);
        localStorage.setItem("students",JSON.stringify(students));
        document.getElementById("testModal").style.display="none";
        alert("检测完成！正确率："+rate);
        render();
        return;
    }
    document.getElementById("chinese").innerText = words[index].cn;
    document.getElementById("answer").value = "";
}

function next(){
    let ans = document.getElementById("answer").value.trim().toLowerCase();
    let right = words[index].en.toLowerCase();
    if(ans !== right){
        errors[right] = (errors[right]||0)+1;
        localStorage.setItem("errors",JSON.stringify(errors));
    }else{
        correct++;
    }
    index++;
    showWord();
}

// ========== 错题统计 ==========
function renderErrors(){
    let list = document.getElementById("errorList");
    list.innerHTML = "";
    Object.entries(errors).sort((a,b)=>b[1]-a[1]).forEach(([w,c])=>{
        let item = document.createElement("div");
        item.innerText = `${w}：${c}次`;
        list.appendChild(item);
    })
}

// 默认打开家长页
window.onload = showParent;
</script>
</body>
</html>
